services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: virtual-trial-room-backend:local
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json,urllib.request; response=urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3); data=json.load(response); raise SystemExit(0 if data.get('status') == 'ok' else 1)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  backend-data:

