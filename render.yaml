services:
  - type: web
    name: virtual-trial-room-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: VTR_ENVIRONMENT
        value: production
      - key: VTR_UPLOAD_DIR
        value: /tmp/virtual-trial-room/uploads
      - key: VTR_OUTPUT_DIR
        value: /tmp/virtual-trial-room/outputs
      - key: VTR_DATABASE_PATH
        value: /tmp/virtual-trial-room/virtual_trial_room.sqlite3
      - key: VTR_MAX_UPLOAD_MB
        value: "12"
      - key: VTR_CORS_ALLOWED_ORIGINS
        value: "*"
      - key: VTR_AI_PROVIDER
        value: local
      - key: VTR_PUBLIC_BASE_URL
        value: https://virtual-trial-room-backend-xz7l.onrender.com
      - key: VTR_RUNPOD_ENDPOINT_ID
        sync: false
      - key: VTR_RUNPOD_API_KEY
        sync: false
      - key: VTR_RUNPOD_TIMEOUT_SECONDS
        value: "180"
